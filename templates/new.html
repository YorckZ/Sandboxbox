{% extends 'index.html' %}

{% block content %}
<div class="container my-4">
  <div class="text-center mb-4">
    <img src="{{ url_for('static', filename='Sandbox_Logo.jpg') }}"
         alt="Sandbox Logo"
         class="sandbox-logo img-fluid">
  </div>

  <div id="frage-history"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
  let flowIndex = 0;

  function escapeHtml(s) {
    return (s ?? "")
      .toString()
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function renderElement(element, idx) {
    if (!element) return;

    let html = "";

    if (element.type === "Frage") {
      html = `
        <div class="card shadow rounded-4 border-0 mb-4 frage-block" data-flow-index="${idx}">
          <div class="card-body p-4">
            <div class="d-flex align-items-center mb-2">
              <i class="bi bi-question-circle text-primary me-2 fs-2"></i>
              <h5 class="mb-0 text-primary">${escapeHtml(element.Bez)}</h5>
            </div>

            <p class="fs-5 mb-4">${escapeHtml(element.Text)}</p>
            ${element.Bem ? `<p class="fst-italic text-muted mb-3">${escapeHtml(element.Bem)}</p>` : ""}

            <div class="row align-items-end mb-2">
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="antwort-dropdown-${idx}">Ihre Antwort</label>
                <select class="form-select antwort-dropdown" id="antwort-dropdown-${idx}" data-id="${element.ID}">
                  <option value="">---</option>
                  <option value="ja">Ja</option>
                  <option value="nein">Nein</option>
                  <option value="unsicher">Nicht sicher</option>
                </select>
              </div>
            </div>
          </div>
        </div>`;
    }

    else if (element.type === "Antwort") {
      html = `
        <div class="card shadow rounded-4 border-0 mb-4 antwort-block" data-flow-index="${idx}">
          <div class="card-body p-4">
            <div class="d-flex align-items-center mb-2">
              <i class="bi bi-chat-left-quote text-success me-2 fs-2"></i>
              <h5 class="mb-0 text-success">${escapeHtml(element.Bez)}</h5>
            </div>

            <p class="fs-5 mb-4">${escapeHtml(element.Text || "")}</p>

            <div class="d-flex justify-content-end gap-2">
              <button class="btn btn-outline-secondary rounded-3 download-history-pdf-btn">
                <i class="bi bi-filetype-pdf me-1"></i>Verlauf als PDF herunterladen
              </button>

              <button class="btn btn-outline-primary rounded-3 send-mail-btn">
                <i class="bi bi-envelope me-1"></i>Send a Mail
              </button>

              <button class="btn btn-outline-primary rounded-3 contact-us-btn">
                <i class="bi bi-envelope me-1"></i>Contact us
              </button>
            </div>

            <div class="contact-form-area mt-4" style="display:none;">
              <hr>

              <div class="text-muted small mb-3">
                * Pflichtfeld
              </div>

              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label class="form-label">Mein Name</label>
                  <input type="text" class="form-control" name="contact_name" required>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label">Mein Unternehmen</label>
                  <input type="text" class="form-control" name="contact_company" required>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label">Meine Position</label>
                  <input type="text" class="form-control" name="contact_position">
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label">Meine Rufnummer</label>
                  <input type="tel" class="form-control" name="contact_phone">
                </div>

                <div class="col-12">
                  <label class="form-label">Meine E-Mail-Adresse</label>
                  <input type="email" class="form-control" name="contact_email" required>
                </div>

                <div class="col-12">
                  <label class="form-label">Freitext</label>
                  <textarea class="form-control" name="contact_message" rows="6"></textarea>
                </div>

                <div class="col-12 d-flex justify-content-end">
                  <button type="button" class="btn btn-primary rounded-3 contact-send-btn">
                    <i class="bi bi-send me-1"></i>Senden
                  </button>
                </div>
              </div>
            </div>

          </div>
        </div>`;
    }

    else if (element.type === "Prompt") {
      html = `
        <div class="card shadow rounded-4 border-0 mb-4 prompt-block" data-flow-index="${idx}">
          <div class="card-body p-4">
            <div class="mb-2">
              <label class="form-label" for="prompt-input-${idx}">
                Fragen Sie SANDy, die Sandbox-KI. Beschreiben Sie Ihre Gründe für und wider die Entscheidung und worin die Unsicherheit liegt, damit SANDy eine Empfehlung aussprechen kann.
              </label>
              <input type="text" class="form-control" id="prompt-input-${idx}" placeholder="Ihre Beschreibung für SANDy..." />
            </div>

            <div class="mb-3">
              <label class="form-label" for="file-input-${idx}">
                (Optional): Stellen Sie SANDy Dokumente zur Auswertung zur Verfügung:
              </label>
              <input type="file" class="form-control" id="file-input-${idx}" accept="application/pdf" />
            </div>

            <div class="mb-3">
              <button class="btn btn-primary run-llm-btn"
                      data-prompt-id="${element.PromptID || element.ID}"
                      data-idx="${idx}">
                <i class="bi bi-stars me-1"></i>Empfehlung anfordern
              </button>
            </div>

            <div id="llm-result-${idx}" class="output-box"></div>
          </div>
        </div>`;
    }

    $('#frage-history').append(html);
    $('html, body').animate({ scrollTop: $(document).height() }, 400);
  }

  function loadInitialFrage() {
    $.get('/get_initial_frage', function(data) {
      $('#frage-history').empty();
      renderElement(data, 0);
      flowIndex = 1;
    }).fail(function(xhr) {
      $('#frage-history').append('<div class="alert alert-danger">Fehler beim Laden der Initialfrage.</div>');
      console.error("Fehler beim Laden der Initialfrage:", xhr);
    });
  }

  function getSelectedAnswerLabel(selectEl) {
    const value = selectEl.value || "";

    if (value === "ja") return "Ja";
    if (value === "nein") return "Nein";
    if (value === "unsicher") return "Nicht sicher";

    return "---";
  }

  function collectQuestionnaireExportData() {
    const items = [];

    document.querySelectorAll("#frage-history [data-flow-index]").forEach((block, index) => {
      const title = (block.querySelector("h5")?.innerText || "").trim();

      if (block.classList.contains("frage-block")) {
        const questionText = (block.querySelector("p.fs-5")?.innerText || "").trim();
        const bem = (block.querySelector(".fst-italic")?.innerText || "").trim();
        const select = block.querySelector("select.antwort-dropdown");

        items.push({
          type: "Frage",
          number: index + 1,
          title: title,
          text: questionText,
          bem: bem,
          answer: select ? getSelectedAnswerLabel(select) : "---"
        });
      }

      else if (block.classList.contains("prompt-block")) {
        const promptLabel = (block.querySelector("label[for^='prompt-input']")?.innerText || "").trim();
        const userInput = (block.querySelector("input[type='text']")?.value || "").trim();
        const llmResult = (block.querySelector(".output-box")?.innerText || "").trim();

        items.push({
          type: "SANDy-Unterstützung",
          number: index + 1,
          title: "SANDy-Unterstützung",
          text: promptLabel,
          userInput: userInput,
          llmResult: llmResult
        });
      }

      else if (block.classList.contains("antwort-block")) {
        const answerText = (block.querySelector("p.fs-5")?.innerText || "").trim();

        items.push({
          type: "Ergebnis",
          number: index + 1,
          title: title,
          text: answerText
        });
      }

      else {
        const doneText = (block.innerText || "").trim();
        if (doneText) {
          items.push({
            type: "Abschluss",
            number: index + 1,
            title: "Abschluss",
            text: doneText
          });
        }
      }
    });

    return items;
  }

  function addWrappedText(doc, text, x, y, maxWidth, lineHeight) {
    const lines = doc.splitTextToSize(text || "", maxWidth);
    lines.forEach(line => {
      if (y > 280) {
        doc.addPage();
        y = 20;
      }

      doc.text(line, x, y);
      y += lineHeight;
    });

    return y;
  }

  function addSectionSpacing(doc, y) {
    if (y > 270) {
      doc.addPage();
      return 20;
    }
    return y + 6;
  }

  function downloadHistoryAsPdf() {
    const { jsPDF } = window.jspdf;

    const doc = new jsPDF({
      orientation: "p",
      unit: "mm",
      format: "a4",
      compress: true
    });

    const marginLeft = 15;
    const marginRight = 15;
    const pageWidth = doc.internal.pageSize.getWidth();
    const usableWidth = pageWidth - marginLeft - marginRight;
    const lineHeight = 5;

    let y = 18;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text("Fragebogen – Verlauf", marginLeft, y);
    y += 8;

    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(`Exportiert am: ${new Date().toLocaleString("de-DE")}`, marginLeft, y);
    y += 10;

    const items = collectQuestionnaireExportData();

    items.forEach(item => {
      if (y > 265) {
        doc.addPage();
        y = 20;
      }

      doc.setFont("helvetica", "bold");
      doc.setFontSize(12);
      y = addWrappedText(doc, `${item.number}. ${item.type}: ${item.title || ""}`, marginLeft, y, usableWidth, lineHeight);
      y += 2;

      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);

      if (item.type === "Frage") {
        y = addWrappedText(doc, `Frage: ${item.text}`, marginLeft, y, usableWidth, lineHeight);

        if (item.bem) {
          y = addWrappedText(doc, `Hinweis: ${item.bem}`, marginLeft, y, usableWidth, lineHeight);
        }

        y = addWrappedText(doc, `Antwort: ${item.answer}`, marginLeft, y, usableWidth, lineHeight);
      }

      else if (item.type === "SANDy-Unterstützung") {
        y = addWrappedText(doc, item.text, marginLeft, y, usableWidth, lineHeight);
        y = addWrappedText(doc, `Eingabe: ${item.userInput || "-"}`, marginLeft, y, usableWidth, lineHeight);

        if (item.llmResult) {
          y = addWrappedText(doc, `SANDy-Antwort: ${item.llmResult}`, marginLeft, y, usableWidth, lineHeight);
        }
      }

      else {
        y = addWrappedText(doc, item.text, marginLeft, y, usableWidth, lineHeight);
      }

      y = addSectionSpacing(doc, y);
    });

    const filename = `fragebogen_verlauf_${new Date().toISOString().slice(0, 10)}.pdf`;
    doc.save(filename);
  }

  function contactUs() {
    fetch("/get_email_config", { cache: "no-store" })
      .then(r => {
        if (!r.ok) throw new Error("Konfiguration nicht gefunden.");
        return r.json();
      })
      .then(config => {
        const recipient = encodeURIComponent(config.email_recipient || "");
        const subject = encodeURIComponent(config.email_subject || "");
        const body = encodeURIComponent(config.email_body || "");
        const mailtoLink = `mailto:${recipient}?subject=${subject}&body=${body}`;

        window.location.href = mailtoLink;
      })
      .catch(err => {
        console.error(err);
        alert("Email-Konfiguration ist nicht gesetzt.");
      });
  }

  $('#frage-history').on('change', '.antwort-dropdown', function() {
    const antwort = $(this).val();
    const currentElementId = $(this).data('id');
    const parentDiv = $(this).closest('[data-flow-index]');
    const idx = parseInt(parentDiv.attr('data-flow-index'), 10);

    $('[data-flow-index]').filter(function() {
      return parseInt($(this).attr('data-flow-index'), 10) > idx;
    }).remove();

    if (!antwort) return;

    flowIndex = idx + 1;

    $.ajax({
      url: '/next_element',
      type: 'POST',
      contentType: 'application/json',
      data: JSON.stringify({
        frage_id: currentElementId,
        antwort: antwort
      }),
      success: function(data) {
        if (data.done) {
          $('#frage-history').append(`
            <div class="card shadow rounded-4 border-0 mb-4" data-flow-index="${flowIndex}">
              <div class="card-body p-4">
                <div class="alert alert-success mb-3">
                  <i class="bi bi-check-circle me-2"></i>${escapeHtml(data.message || "Fragebogen beendet.")}
                </div>

                <div class="d-flex justify-content-end gap-2">
                  <button class="btn btn-outline-secondary rounded-3 download-history-pdf-btn">
                    <i class="bi bi-filetype-pdf me-1"></i>Verlauf als PDF herunterladen
                  </button>

                  <button class="btn btn-outline-primary rounded-3 contact-us-btn">
                    <i class="bi bi-envelope me-1"></i>Contact us
                  </button>
                </div>
              </div>
            </div>
          `);
        } else {
          renderElement(data, flowIndex);
          flowIndex += 1;
        }
      },
      error: function(xhr) {
        $('#frage-history').append('<div class="alert alert-danger">Fehler beim Laden des nächsten Elements.</div>');
        console.error("Fehler beim Laden des nächsten Elements:", xhr);
      }
    });
  });

  $('#frage-history').on('click', '.run-llm-btn', function(e) {
    e.preventDefault();

    const $btn = $(this);
    const idx = $btn.data('idx');
    const promptId = $btn.data('prompt-id');

    const userInput = $(`#prompt-input-${idx}`).val() || "";
    const fileEl = $(`#file-input-${idx}`)[0];
    const file = fileEl && fileEl.files ? fileEl.files[0] : null;

    const $result = $(`#llm-result-${idx}`);
    const spinner = `
      <div class="d-flex align-items-center gap-2">
        <div class="spinner-border" role="status" aria-label="Berechnung läuft"></div>
        <span>Bitte warten – die Empfehlung wird berechnet…</span>
      </div>
    `;

    $result.html(spinner).css('display', 'block');
    $btn.prop('disabled', true).addClass('disabled');

    const formData = new FormData();
    formData.append('prompt_id', String(promptId));
    formData.append('user_input', userInput);
    if (file) formData.append('file', file);

    fetch('/run_prompt', { method: 'POST', body: formData })
      .then(r => r.json())
      .then(data => {
        let html;

        if (data.result) {
          html = `<div><strong>Antwort:</strong><br>${escapeHtml(data.result)}</div>`;
        } else if (data.error) {
          html = `Fehler: ${escapeHtml(data.error)}`;
        } else {
          html = "Keine Antwort erhalten.";
        }

        $result.html(html);
      })
      .catch(() => {
        $result.html('Fehler beim Ausführen des Prompts.');
      })
      .finally(() => {
        $btn.prop('disabled', false).removeClass('disabled');
      });
  });

  $('#frage-history').on('click', '#restart-btn', function() {
    $('#frage-history').empty();
    flowIndex = 0;
    loadInitialFrage();
  });

  $("#frage-history").on("click", ".download-history-pdf-btn", async function() {
    const $btn = $(this);
    const oldHtml = $btn.html();

    try {
      $btn.prop("disabled", true).addClass("disabled")
        .html('<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>PDF wird erstellt…');

      downloadHistoryAsPdf();
    } catch (e) {
      console.error(e);
      alert("Fehler beim Erstellen der PDF-Datei: " + (e?.message || e));
    } finally {
      $btn.prop("disabled", false).removeClass("disabled").html(oldHtml);
    }
  });

  $("#frage-history").on("click", ".send-mail-btn", function() {
    contactUs();
  });

  $("#frage-history").on("click", ".contact-us-btn", function() {
    const $card = $(this).closest(".card-body");
    const $formArea = $card.find(".contact-form-area");

    $(".contact-form-area").not($formArea).slideUp(200);
    $formArea.slideToggle(200);
  });

  $("#frage-history").on("click", ".contact-send-btn", function() {

  const $formArea = $(this).closest(".contact-form-area");

  const name = $formArea.find("[name='contact_name']").val().trim();
  const company = $formArea.find("[name='contact_company']").val().trim();
  const position = $formArea.find("[name='contact_position']").val().trim();
  const phone = $formArea.find("[name='contact_phone']").val().trim();
  const email = $formArea.find("[name='contact_email']").val().trim();
  const message = $formArea.find("[name='contact_message']").val().trim();

  if (!name || !company || !email) {
    alert("Bitte füllen Sie die Pflichtfelder aus: Mein Name, Mein Unternehmen und Meine E-Mail-Adresse.");
    return;
  }

  fetch("/send_contact_email", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      company,
      position,
      phone,
      email,
      message
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      alert("Anfrage wurde versendet.");
    } else {
      alert(data.message || "Fehler beim Versand.");
    }
  })
  .catch(err => {
    console.error(err);
    alert("Technischer Fehler.");
  });

});

  $(document).ready(function() {
    loadInitialFrage();
  });
</script>
{% endblock %}
