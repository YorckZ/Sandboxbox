{% extends 'index.html' %}

{% block content %}
<div class="container mt-5 mb-5">
  <div class="card shadow rounded-4 border-0">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="mb-0 text-primary">
          <i class="bi bi-list-ul me-2"></i>Alle Fragen
        </h2>

        <div class="d-flex gap-2">
          <a class="btn btn-outline-primary rounded-3" href="/anlegen_frage">
            <i class="bi bi-plus-circle me-1"></i>Neu
          </a>
          <a class="btn btn-outline-primary rounded-3" href="/graph">
            <i class="bi bi-diagram-3 me-1"></i>Graph
          </a>
        </div>
      </div>

      <div class="row g-2 mb-3">
        <div class="col-md-6">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input id="filterInput" type="text" class="form-control" placeholder="Filtern nach Bez oder Text …">
          </div>
        </div>
        <div class="col-md-6 text-md-end">
          <span class="text-muted">
            <i class="bi bi-info-circle me-1"></i>
            Klick auf <i class="bi bi-pencil-square"></i> öffnet die Bearbeitung mit vorausgewählter Frage.
          </span>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle" id="fragenTable">
          <thead class="table-light">
            <tr>
              <th style="width: 70px;">ID</th>
              <th style="width: 220px;">Bez</th>
              <th>Text</th>
              <th class="text-center" style="width: 90px;">Edit</th>
            </tr>
          </thead>
          <tbody id="fragenTbody">
            <!-- Filled by JS -->
          </tbody>
        </table>
      </div>

      <p id="statusMessage" class="mt-3 text-muted mb-0"></p>
    </div>
  </div>
</div>

<script>
  const tbody = document.getElementById("fragenTbody");
  const statusMessage = document.getElementById("statusMessage");
  const filterInput = document.getElementById("filterInput");

  let fragenCache = [];

  function escapeHtml(s) {
    return (s ?? "")
      .toString()
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function renderRows(list) {
    if (!list.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="4" class="text-center text-muted py-4">
            Keine Fragen gefunden.
          </td>
        </tr>`;
      return;
    }

    tbody.innerHTML = list.map(q => {
      const id = q.ID;
      const bez = escapeHtml(q.Bez);
      const text = escapeHtml(q.Text || "");
      return `
        <tr>
          <td class="text-muted">${id}</td>
          <td><span class="fw-semibold">${bez}</span></td>
          <td>${text}</td>
          <td class="text-center">
            <a class="btn btn-sm btn-outline-primary rounded-3"
               href="/edit_frage?id=${encodeURIComponent(id)}"
               title="Bearbeiten">
              <i class="bi bi-pencil-square"></i>
            </a>
          </td>
        </tr>
      `;
    }).join("");
  }

  function applyFilter() {
    const q = (filterInput.value || "").trim().toLowerCase();
    if (!q) return renderRows(fragenCache);

    const filtered = fragenCache.filter(item => {
      const bez = (item.Bez || "").toLowerCase();
      const text = (item.Text || "").toLowerCase();
      return bez.includes(q) || text.includes(q);
    });

    renderRows(filtered);
  }

  function loadFragen() {
    statusMessage.textContent = "Lade Fragen …";
    fetch("/get_fragen")
      .then(r => r.json())
      .then(data => {
        // Your /get_fragen currently returns [{"ID","Bez"}]; if you later add Text, it will show automatically.
        fragenCache = Array.isArray(data) ? data : [];
        statusMessage.textContent = `${fragenCache.length} Frage(n) geladen.`;
        renderRows(fragenCache);
      })
      .catch(err => {
        console.error(err);
        statusMessage.textContent = "Fehler beim Laden der Fragen.";
        renderRows([]);
      });
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadFragen();
    filterInput.addEventListener("input", applyFilter);
  });
</script>
{% endblock %}
