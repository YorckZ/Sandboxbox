<div class="container mt-5 mb-5">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h2 class="mb-4 text-primary">
                <i class="bi bi-plus-circle me-2"></i>Neue Antwort hinzufügen
            </h2>

            <form id="antwortForm" autocomplete="off">
                <div class="mb-3">
                    <label for="bez" class="form-label">
                        Identifikator
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Ein kurzer, eindeutiger Name (z.B. AN01), der diese Antwort im System identifiziert."></i>
                    </label>
                    <input type="text" class="form-control rounded-3" id="bez" name="bez" required placeholder="z.B. AN01">
                </div>

                <div class="mb-4">
                    <label for="text" class="form-label">
                        Antworttext
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Formulieren Sie hier die Antwort, wie sie den Nutzern angezeigt werden soll."></i>
                    </label>
                    <textarea class="form-control rounded-3" id="text" name="text" rows="3" required placeholder="Geben Sie die vollständige Antwort ein..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary px-4 rounded-3 shadow-sm">
                    <i class="bi bi-save me-1"></i>Speichern
                </button>
            </form>

            <p id="statusMessage" class="mt-3"></p>
        </div>
    </div>
</div>


<!-- Bootstrap Tooltips Activation Script -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });

        document.getElementById("antwortForm").addEventListener("submit", function(event) {
            event.preventDefault();
            let formData = {
                bez: document.getElementById("bez").value,
                text: document.getElementById("text").value
            };

            fetch("/save_antwort", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("statusMessage").textContent = data.message;
                document.getElementById("antwortForm").reset();
            })
            .catch(error => console.error("Fehler:", error));
        });
    });
</script>
{% endblock %}
