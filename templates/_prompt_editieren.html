{% extends "index.html" %}

{% block content %}

<div class="container mt-5 mb-5">
  <div class="card shadow rounded-4 border-0">
    <div class="card-body p-4">
      <h2 class="mb-4 text-primary">
        <i class="bi bi-pencil-square me-2"></i>Prompt bearbeiten
      </h2>

      <form id="promptForm" autocomplete="off">
        <!-- Auswahl des zu bearbeitenden Prompts -->
        <div class="mb-4">
          <label for="bezDropdown" class="form-label">
            Wähle eine Kurzbezeichnung
            <i class="bi bi-info-circle-fill ms-2 text-info"
               data-bs-toggle="tooltip"
               title="Vorhandene Kurzbezeichnung auswählen, um die Daten zu laden."></i>
          </label>
          <select class="form-select rounded-3 w-auto d-inline-block" id="bezDropdown" name="bezDropdown">
            <option value="">-- Bitte wählen --</option>
          </select>
        </div>

        <!-- Kurzbezeichnung (bleibt fett) -->
        <div class="mb-3">
          <label for="bez" class="form-label">
            Kurzbezeichnung
            <i class="bi bi-info-circle-fill ms-2 text-info"
               data-bs-toggle="tooltip"
               title="Eindeutige Kurzbezeichnung für den Prompt."></i>
          </label>
          <input type="text" class="form-control rounded-3" id="bez" name="bez" required>
        </div>

        <!-- Label A (nicht fett) -->
        <div class="mb-2">
          <label class="form-label mb-0" style="font-weight: normal;">
            Du bist Experte für Datenschutz und sollst eine Empfehlung aussprechen.
            Dem Benutzer wurde folgende Frage gestellt:
          </label>
        </div>

        <!-- Dropdown für Frage (zeigt 'bez: text', Wert ist ebenfalls dieser String) -->
        <div class="mb-3">
          <select class="form-select rounded-3" id="frageDropdown" name="frageDropdown">
            <option value="">-- Bitte wählen --</option>
          </select>
        </div>

        <!-- Label B (nicht fett) -->
        <div class="mb-2">
          <label class="form-label mb-0" style="font-weight: normal;">
            Der Nutzer ist sich nicht sicher. Der entsprechende Rechtstext lautet:
          </label>
        </div>

        <!-- DSGVO-Text -->
        <div class="mb-4">
          <label for="dsgvo" class="form-label mb-1" style="font-weight: normal;"></label>
          <textarea class="form-control rounded-3" id="dsgvo" name="dsgvo" rows="5"
                    placeholder="Bitte Artikel der DSGVO im Wortlaut eintragen."></textarea>
        </div>

        <!-- D / E / F (nur Labels, nicht fett) -->
        <div class="mb-2">
          <label class="form-label mb-0" style="font-weight: normal;">Er hat hierzu folgendes angegeben: {Angaben_des_Users}.</label>
        </div>
        <div class="mb-2">
          <label class="form-label mb-0" style="font-weight: normal;">
            (Optional:)<br>
            Weiterhin hat er folgende Dokumenteninhalte bereitgestellt: {document_text}.
          </label>
        </div>
        <div class="mb-4">
          <label class="form-label mb-0" style="font-weight: normal;">
            Gib eine Empfehlung, ob die DSGVO zutrifft. Antworte zunächst nur mit Ja oder Nein. Anschließend begründe
            Deine Einschätzung. Zuletzt weise darauf hin, dass Du nur eine KI bist und dass dies keine Rechtsberatung darstellt.
          </label>
        </div>

        <button type="submit" class="btn btn-primary px-4 rounded-3 shadow-sm">
          <i class="bi bi-arrow-repeat me-1"></i>Ändern
        </button>

        <a href="/graph" class="btn btn-primary px-4 rounded-3 shadow-sm ms-2">
          <i class="bi bi-diagram-3 me-1"></i>Graph
        </a>

      </form>

      <p id="statusMessage" class="mt-3"></p>
    </div>
  </div>
</div>

<script>
  // --- Helpers ---

  function fillPromptDropdown() {
    const dd = document.getElementById("bezDropdown");
    return fetch("/get_prompts")
      .then(r => r.json())
      .then(list => {
        // sort by Bez (case-insensitive)
        list.sort((a, b) => (a.Bez || "").toLowerCase().localeCompare((b.Bez || "").toLowerCase()));
        dd.innerHTML = '<option value="">-- Bitte wählen --</option>';
        list.forEach(p => {
          const opt = document.createElement("option");
          opt.value = p.ID;
          opt.textContent = p.Bez;
          dd.appendChild(opt);
        });
      });
  }

  function fillFragenDropdown(selectedDisplay) {
    const sel = document.getElementById("frageDropdown");
    return fetch("/fragen_dropdown")
      .then(r => r.json())
      .then(items => {
        sel.innerHTML = '<option value="">-- Bitte wählen --</option>';
        items.forEach(it => {
          const opt = document.createElement("option");
          opt.value = it.display;       // value is the "bez: text" string
          opt.textContent = it.display; // display matches value
          sel.appendChild(opt);
        });

        if (selectedDisplay) {
          // preselect saved Frage; if missing, add it temporarily so the user sees it
          const found = Array.from(sel.options).find(o => o.value === selectedDisplay);
          if (found) {
            sel.value = selectedDisplay;
          } else {
            const extra = new Option(selectedDisplay, selectedDisplay, true, true);
            sel.add(extra, 1);
          }
        }
      });
  }

  // --- Event wiring ---

  document.addEventListener("DOMContentLoaded", function() {
    // tooltips
    const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl);
    });

    // Load dropdowns first
    const init = Promise.all([fillPromptDropdown(), fillFragenDropdown("")]);

    // If page opened with ?id=<PROMPT_ID>, preselect and load it
    init.then(() => {
      const params = new URLSearchParams(window.location.search);
      const preId = params.get('id');
      if (preId) {
        const sel = document.getElementById("bezDropdown");
        sel.value = preId;
        sel.dispatchEvent(new Event('change'));
      }
    });

    // When selecting a prompt, load its data
    document.getElementById("bezDropdown").addEventListener("change", function() {
      const id = this.value;
      if (!id) return;

      fetch(`/get_prompt/${id}`)
        .then(r => r.json())
        .then(data => {
          document.getElementById("bez").value = data.Bez || "";
          document.getElementById("dsgvo").value = data.DSGVO || "";

          const wanted = data.Frage || ""; // saved "bez: text"
          // Refill Fragen list and preselect saved value
          return fillFragenDropdown(wanted);
        })
        .catch(err => {
          console.error("Fehler beim Laden des Prompts:", err);
          document.getElementById("statusMessage").textContent = "Fehler beim Laden des Prompts.";
        });
    });

    // Submit updates
    document.getElementById("promptForm").addEventListener("submit", function(event) {
      event.preventDefault();
      const id = document.getElementById("bezDropdown").value;
      if (!id) {
        document.getElementById("statusMessage").textContent = "Bitte zuerst einen Prompt auswählen.";
        return;
      }

      const formData = {
        id: id,
        bez: document.getElementById("bez").value,
        frage: document.getElementById("frageDropdown").value, // "bez: text"
        dsgvo: document.getElementById("dsgvo").value
      };

      fetch("/update_prompt", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById("statusMessage").textContent = data.message || "Gespeichert.";
        // refresh the prompt list in case Bez changed
        return fillPromptDropdown();
      })
      .catch(err => {
        console.error("Fehler:", err);
        document.getElementById("statusMessage").textContent = "Fehler beim Speichern.";
      });
    });
  });
</script>

{% endblock %}
