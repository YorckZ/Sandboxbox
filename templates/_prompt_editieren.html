{% extends "index.html" %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h2 class="mb-4 text-primary">
                <i class="bi bi-pencil-square me-2"></i>Prompt bearbeiten
            </h2>

            <form id="promptForm" autocomplete="off">
                <div class="mb-4">
                    <label for="bezDropdown" class="form-label">
                        Wähle eine Kurzbezeichnung
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Vorhandene Kurzbezeichnung auswählen, um die Daten zu laden."></i>
                    </label>
                    <select class="form-select rounded-3 w-auto d-inline-block" id="bezDropdown" name="bezDropdown">
                        <option value="">-- Bitte wählen --</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="bez" class="form-label">
                        Kurzbezeichnung
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Eindeutige Kurzbezeichnung für den Prompt."></i>
                    </label>
                    <input type="text" class="form-control rounded-3" id="bez" name="bez" required placeholder="z.B. PR02">
                </div>

                <div class="mb-3">
                    <label for="system" class="form-label">
                        System
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="System-Prompt, der das Verhalten des LLMs steuert (z. B. Rollenbeschreibung, Stilvorgabe)."></i>
                    </label>
                    <textarea class="form-control rounded-3" id="system" name="system" rows="3" required placeholder="z.B. Du bist ein hilfsbereiter Assistent..."></textarea>
                </div>

                <div class="mb-3">
                    <label for="dsgvo" class="form-label">
                        DSGVO
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Hinweise oder Anweisungen im Kontext des Datenschutzes (optional)."></i>
                    </label>
                    <textarea class="form-control rounded-3" id="dsgvo" name="dsgvo" rows="2" placeholder="z.B. Keine personenbezogenen Daten verwenden..."></textarea>
                </div>

                <div class="mb-4">
                    <label for="task" class="form-label">
                        Aufgabe des LLMs
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Beschreibung der spezifischen Aufgabe für das LLM (optional)."></i>
                    </label>
                    <textarea class="form-control rounded-3" id="task" name="task" rows="2" placeholder="z.B. Generierung von Produktbeschreibungen..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary px-4 rounded-3 shadow-sm">
                    <i class="bi bi-arrow-repeat me-1"></i>Ändern
                </button>
            </form>

            <p id="statusMessage" class="mt-3"></p>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        fetch("/get_prompts")
            .then(response => response.json())
            .then(data => {
                let dropdown = document.getElementById("bezDropdown");
                data.forEach(prompt => {
                    let option = document.createElement("option");
                    option.value = prompt.ID;
                    option.textContent = prompt.Bez;
                    dropdown.appendChild(option);
                });
            })
            .catch(error => console.error("Fehler beim Laden der Prompts:", error));
    });

    document.getElementById("bezDropdown").addEventListener("change", function() {
        let promptId = this.value;
        if (!promptId) return;

        fetch(`/get_prompt/${promptId}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("bez").value = data.Bez;
                document.getElementById("system").value = data.System;
                document.getElementById("dsgvo").value = data.DSGVO || "";
                document.getElementById("task").value = data.Task || "";
            })
            .catch(error => console.error("Fehler beim Laden des Prompts:", error));
    });

    document.getElementById("promptForm").addEventListener("submit", function(event) {
        event.preventDefault();
        let formData = {
            id: document.getElementById("bezDropdown").value,
            bez: document.getElementById("bez").value,
            system: document.getElementById("system").value,
            dsgvo: document.getElementById("dsgvo").value,
            task: document.getElementById("task").value
        };

        fetch("/update_prompt", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById("statusMessage").textContent = data.message;
        })
        .catch(error => console.error("Fehler:", error));
    });
</script>

{% endblock %}
