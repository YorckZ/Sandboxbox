{% extends "index.html" %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h2 class="mb-4 text-primary">
                <i class="bi bi-plus-circle me-2"></i>Neue Frage anlegen
            </h2>

            <form id="frageForm" autocomplete="off">
                <div class="mb-3">
                    <label for="bez" class="form-label">
                        Identifikator
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Ein kurzer, eindeutiger Name (z.B. FR01), der diese Frage im System identifiziert."></i>
                    </label>
                    <input type="text" class="form-control rounded-3" id="bez" name="bez" required placeholder="z.B. FR01">
                </div>

                <div class="mb-3">
                    <label for="text" class="form-label">
                        Fragetext
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Formulieren Sie hier die eigentliche Frage so, wie sie den Nutzern angezeigt werden soll."></i>
                    </label>
                    <textarea class="form-control rounded-3" id="text" name="text" rows="3" required placeholder="Geben Sie die vollständige Frage ein..."></textarea>
                </div>

                <div class="mb-3">
                    <label for="bem" class="form-label">
                        Ergänzung/Hinweis/Bemerkung
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Hier können Sie zusätzliche Hinweise oder Hilfestellungen für diese Frage hinterlegen. (optional)"></i>
                    </label>
                    <textarea class="form-control rounded-3" id="bem" name="bem" rows="2" placeholder="z.B. Hinweise zur Beantwortung..."></textarea>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4 mb-2 mb-md-0">
                        <label for="ja" class="form-label">
                            Ja (nächstes Element)
                            <i class="bi bi-info-circle-fill ms-2 text-info"
                               data-bs-toggle="tooltip"
                               title="Wählen Sie das nächste Element, das bei Antwort 'Ja' angezeigt wird."></i>
                        </label>
                        <select class="form-select rounded-3" id="ja" name="ja">
                            <option value="">-- wählen --</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-2 mb-md-0">
                        <label for="nein" class="form-label">
                            Nein (nächstes Element)
                            <i class="bi bi-info-circle-fill ms-2 text-info"
                               data-bs-toggle="tooltip"
                               title="Wählen Sie das nächste Element, das bei Antwort 'Nein' angezeigt wird."></i>
                        </label>
                        <select class="form-select rounded-3" id="nein" name="nein">
                            <option value="">-- wählen --</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="unsicher" class="form-label">
<!--                            Unsicher (nächstes Element)-->
                            Nicht sicher (nächstes Element)
                            <i class="bi bi-info-circle-fill ms-2 text-info"
                               data-bs-toggle="tooltip"
                               title="Wählen Sie das nächste Element, das bei Antwort 'Micht sicher' angezeigt wird."></i>
<!--                               title="Wählen Sie das nächste Element, das bei Antwort 'Unsicher' angezeigt wird."></i>-->
                        </label>
                        <select class="form-select rounded-3" id="unsicher" name="unsicher">
                            <option value="">-- wählen --</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="initial" class="form-label">
                        Ist dies die Startfrage?
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Wählen Sie 'Ja', wenn dies der Startpunkt des Entscheidungsbaums sein soll."></i>
                    </label>
                    <select class="form-select rounded-3 w-auto d-inline-block" id="initial" name="initial">
                        <option value="0">Nein</option>
                        <option value="1">Ja</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary px-4 rounded-3 shadow-sm">
                    <i class="bi bi-save me-1"></i>Speichern
                </button>
            </form>

            <p id="statusMessage" class="mt-3"></p>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });

        document.getElementById("frageForm").addEventListener("submit", function (event) {
            event.preventDefault();
            let formData = {
                bez: document.getElementById("bez").value,
                text: document.getElementById("text").value,
                bem: document.getElementById("bem").value,
                ja: document.getElementById("ja").value || null,
                nein: document.getElementById("nein").value || null,
                unsicher: document.getElementById("unsicher").value || null,
                initial: document.getElementById("initial").value
            };

            fetch("/save_frage", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("statusMessage").textContent = data.message;
                document.getElementById("frageForm").reset();
            })
            .catch(error => console.error("Error:", error));
        });
    });

    function createOption(item) {
        return `<option value="${item.ID}">${item.Bez} (${item.type})</option>`;
    }

    fetch("/all_bez")
        .then(response => response.json())
        .then(list => {
            // Filtered lists
            const allowedYesNo = list.filter(it => it.type === "Frage" || it.type === "Antwort");
            // const allowedUnsicher = list.filter(it => it.type === "Prompt");
            const allowedUnsicher = list.filter(it => it.type === "Frage" || it.type === "Prompt");

            // Populate selects
            const jaSel = document.getElementById("ja");
            const neinSel = document.getElementById("nein");
            const unsicherSel = document.getElementById("unsicher");

            jaSel.innerHTML = '<option value="">-- wählen --</option>' + allowedYesNo.map(createOption).join('');
            neinSel.innerHTML = '<option value="">-- wählen --</option>' + allowedYesNo.map(createOption).join('');
            unsicherSel.innerHTML = '<option value="">-- wählen --</option>' + allowedUnsicher.map(createOption).join('');
        })
        .catch(err => console.error("Fehler beim Laden der Bez-Liste:", err));
</script>
{% endblock %}
