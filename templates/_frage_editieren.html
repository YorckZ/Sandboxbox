{% extends 'index.html' %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h2 class="mb-4 text-primary">
                <i class="bi bi-pencil-square me-2"></i>Frage bearbeiten
            </h2>

            <div class="mb-4">
                <label for="frageSelect" class="form-label">
                    Frage auswählen
                    <i class="bi bi-info-circle-fill ms-2 text-info"
                       data-bs-toggle="tooltip"
                       title="Wählen Sie eine bestehende Frage aus, um sie zu bearbeiten."></i>
                </label>
                <select id="frageSelect" class="form-select rounded-3 w-auto d-inline-block" onchange="loadFrage()">
                    <option value="">-- Bitte wählen --</option>
                    {% for frage in fragen %}
                        <option value="{{ frage.ID }}">{{ frage.Bez }}</option>
                    {% endfor %}
                </select>
            </div>

            <form id="frageForm" autocomplete="off">
                <div class="mb-3">
                    <label for="bez" class="form-label">
                        Identifikator
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Eindeutiger Kurzname für die Frage."></i>
                    </label>
                    <input type="text" class="form-control rounded-3" id="bez" name="bez" required>
                </div>

                <div class="mb-3">
                    <label for="text" class="form-label">
                        Fragetext
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Der vollständige Text der Frage, wie sie angezeigt wird."></i>
                    </label>
                    <textarea class="form-control rounded-3" id="text" name="text" rows="3" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="bem" class="form-label">
                        Ergänzung/Hinweis/Bemerkung
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Zusätzliche Hinweise oder Hilfestellung zur Frage. (optional)"></i>
                    </label>
                    <textarea class="form-control rounded-3" id="bem" name="bem" rows="2"></textarea>
                </div>

                <!-- Dropdowns with filtering -->
                <div class="row mb-3">
                    <div class="col-md-4 mb-2 mb-md-0">
                        <label for="ja" class="form-label">
                            Ja (nächstes Element)
                            <i class="bi bi-info-circle-fill ms-2 text-info"
                               data-bs-toggle="tooltip"
                               title="Wählen Sie das nächste Element, das bei Antwort 'Ja' angezeigt wird."></i>
                        </label>
                        <select class="form-select rounded-3" id="ja" name="ja">
                            <option value="">-- wählen --</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-2 mb-md-0">
                        <label for="nein" class="form-label">
                            Nein (nächstes Element)
                            <i class="bi bi-info-circle-fill ms-2 text-info"
                               data-bs-toggle="tooltip"
                               title="Wählen Sie das nächste Element, das bei Antwort 'Nein' angezeigt wird."></i>
                        </label>
                        <select class="form-select rounded-3" id="nein" name="nein">
                            <option value="">-- wählen --</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="unsicher" class="form-label">
<!--                            Unsicher (nächstes Element)-->
                            Nicht sicher (nächstes Element)
                            <i class="bi bi-info-circle-fill ms-2 text-info"
                               data-bs-toggle="tooltip"
                               title="Wählen Sie das nächste Element, das bei Antwort 'Nicht sicher' angezeigt wird."></i>
<!--                               title="Wählen Sie das nächste Element, das bei Antwort 'Unsicher' angezeigt wird."></i>-->
                        </label>
                        <select class="form-select rounded-3" id="unsicher" name="unsicher">
                            <option value="">-- wählen --</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="initial" class="form-label">
                        Ist dies die Startfrage?
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Legt fest, ob diese Frage die erste im Entscheidungsbaum ist."></i>
                    </label>
                    <select class="form-select rounded-3 w-auto d-inline-block" id="initial" name="initial">
                        <option value="0">Nein</option>
                        <option value="1">Ja</option>
                    </select>
                </div>

                <button type="button" class="btn btn-primary px-4 rounded-3 shadow-sm" onclick="updateFrage()">
                    <i class="bi bi-arrow-repeat me-1"></i>Aktualisieren
                </button>

                <a href="/graph" class="btn btn-primary px-4 rounded-3 shadow-sm ms-2">
                  <i class="bi bi-diagram-3 me-1"></i>Graph
                </a>

            </form>

            <p id="statusMessage" class="mt-3"></p>
        </div>
    </div>
</div>

<script>
    // cache of all Bez entries
    let allBezList = [];
    let allBezLoaded = false;

    function createOption(item) {
        return `<option value="${item.ID}">${item.Bez} (${item.type})</option>`;
    }

    function populateSelectFiltered(selectId, allowedTypes) {
        const sel = document.getElementById(selectId);
        sel.innerHTML = '<option value="">-- wählen --</option>' +
            allBezList.filter(it => allowedTypes.includes(it.type)).map(createOption).join('');
    }

    function ensureValueVisible(selectId, value) {
        if (!value) return;
        const sel = document.getElementById(selectId);
        if ([...sel.options].some(o => String(o.value) === String(value))) return;

        // add a temporary, selected option for the current (now disallowed) value
        const found = allBezList.find(it => String(it.ID) === String(value));
        const label = found ? `${found.Bez} (${found.type}) – nicht erlaubt` : `ID ${value} – nicht erlaubt`;
        const opt = new Option(label, value, true, true);
        sel.add(opt, 1);
    }

    function initAllBez() {
        if (allBezLoaded) return Promise.resolve();
        return fetch("/all_bez")
            .then(r => r.json())
            .then(list => {
                allBezList = list; // [{Bez, type, ID}]
                // Fill with filters:
                populateSelectFiltered("ja", ["Frage", "Antwort"]);
                populateSelectFiltered("nein", ["Frage", "Antwort"]);
                // populateSelectFiltered("unsicher", ["Prompt"]);
                populateSelectFiltered("unsicher", ["Frage", "Prompt"]);
                allBezLoaded = true;
            })
            .catch(err => console.error("Fehler beim Laden der Bez-Liste:", err));
    }

    function loadFrage() {
        const frageId = document.getElementById("frageSelect").value;
        if (!frageId) return;

        initAllBez()
            .then(() => fetch(`/get_frage/${frageId}`))
            .then(response => response.json())
            .then(data => {
                document.getElementById("bez").value = data.Bez || "";
                document.getElementById("text").value = data.Text || "";
                document.getElementById("bem").value = data.Bem || "";

                const jaVal = data.Ja ?? data.ja ?? "";
                const neinVal = data.Nein ?? data.nein ?? "";
                const unsicherVal = data.unsicher ?? data.Unsicher ?? "";

                // set allowed selections
                document.getElementById("ja").value = jaVal || "";
                document.getElementById("nein").value = neinVal || "";
                document.getElementById("unsicher").value = unsicherVal || "";

                // if a saved value is now disallowed, still show it (marked)
                ensureValueVisible("ja", jaVal);
                ensureValueVisible("nein", neinVal);
                ensureValueVisible("unsicher", unsicherVal);

                document.getElementById("initial").value = data.Initial ? "1" : "0";
                document.getElementById("frageForm").dataset.frageId = frageId;
            })
            .catch(() => alert("Fehler beim Laden der Frage."));
    }

    function updateFrage() {
        const frageId = document.getElementById("frageForm").dataset.frageId;
        if (!frageId) {
            alert("Bitte zuerst eine Frage auswählen.");
            return;
        }

        const initialValue = document.getElementById("initial").value;
        if (initialValue === "1") {
            if (!confirm("Achtung: Es kann nur eine Startfrage geben. Wenn Sie fortfahren, wird diese Frage zur neuen Startfrage gesetzt und alle anderen werden zurückgesetzt. Fortfahren?")) {
                return;
            }
        }

        const formData = {
            id: parseInt(frageId, 10),
            bez: document.getElementById("bez").value,
            text: document.getElementById("text").value,
            bem: document.getElementById("bem").value,
            ja: document.getElementById("ja").value || null,
            nein: document.getElementById("nein").value || null,
            unsicher: document.getElementById("unsicher").value || null,
            initial: parseInt(initialValue, 10)
        };

        fetch('/update_frage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById("statusMessage").textContent = data.message || "Gespeichert.";
        })
        .catch(() => {
            document.getElementById("statusMessage").textContent = "Fehler beim Aktualisieren der Frage.";
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });

        initAllBez(); // prefill the filtered option lists
        // after initAllBez() etc.
        const params = new URLSearchParams(window.location.search);
        const preId = params.get('id');
        if (preId) {
          const sel = document.getElementById("frageSelect");
          sel.value = preId;
          loadFrage();
        }

    });
</script>
{% endblock %}
