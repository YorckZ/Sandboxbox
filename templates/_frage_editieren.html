{% extends 'index.html' %}

{% block content %}

<h1>Edit Frage</h1>

<label for="frageSelect">Select Frage:</label>
<select id="frageSelect" onchange="loadFrage()">
    <option value="">-- Select --</option>
    {% for frage in fragen %}
        <option value="{{ frage.ID }}">{{ frage.Bez }}</option>
    {% endfor %}
</select>

<form id="frageForm">
    <div class="mb-3">
        <label for="bez" class="form-label">
            Identifikator:
            <i class="bi bi-info-circle-fill ms-2 text-info" data-bs-toggle="tooltip" title="Eindeutiger Kurzname für die Frage."></i>
        </label>
        <input type="text" class="form-control" id="bez" name="bez" required>
    </div>
    <div class="mb-3">
        <label for="text" class="form-label">
            Fragetext:
            <i class="bi bi-info-circle-fill ms-2 text-info" data-bs-toggle="tooltip" title="Der vollständige Text der Frage, wie sie angezeigt wird."></i>
        </label>
        <textarea class="form-control" id="text" name="text" rows="4" required></textarea>
    </div>
    <div class="mb-3">
        <label for="bem" class="form-label">
            Ergänzung/Hinweis/Bemerkung:
            <i class="bi bi-info-circle-fill ms-2 text-info" data-bs-toggle="tooltip" title="Zusätzliche Hinweise oder Hilfestellung zur Frage."></i>
        </label>
        <textarea class="form-control" id="bem" name="bem" rows="2"></textarea>
    </div>
    <div class="mb-3">
        <label for="ja" class="form-label">
            Ja (nächstes Element ID):
            <i class="bi bi-info-circle-fill ms-2 text-info" data-bs-toggle="tooltip" title="ID des nächsten Elements, falls 'Ja' gewählt wird."></i>
        </label>
        <input type="number" class="form-control" id="ja" name="ja">
    </div>
    <div class="mb-3">
        <label for="nein" class="form-label">
            Nein (nächstes Element ID):
            <i class="bi bi-info-circle-fill ms-2 text-info" data-bs-toggle="tooltip" title="ID des nächsten Elements, falls 'Nein' gewählt wird."></i>
        </label>
        <input type="number" class="form-control" id="nein" name="nein">
    </div>
    <div class="mb-3">
        <label for="unsicher" class="form-label">
            Unsicher (nächstes Element ID):
            <i class="bi bi-info-circle-fill ms-2 text-info" data-bs-toggle="tooltip" title="ID des nächsten Elements, falls 'Unsicher' gewählt wird."></i>
        </label>
        <input type="number" class="form-control" id="unsicher" name="unsicher">
    </div>
    <div class="mb-3">
        <label for="initial" class="form-label">
            Ist dies die Startfrage?
            <i class="bi bi-info-circle-fill ms-2 text-info" data-bs-toggle="tooltip" title="Legt fest, ob diese Frage die erste im Entscheidungsbaum ist."></i>
        </label>
        <select class="form-control" id="initial" name="initial">
            <option value="0">Nein</option>
            <option value="1">Ja</option>
        </select>
    </div>
    <button type="button" class="btn btn-primary" onclick="updateFrage()">Update</button>
</form>

<script>
    function loadFrage() {
        const frageId = document.getElementById("frageSelect").value;
        if (!frageId) return;

        fetch(`/get_frage/${frageId}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("bez").value = data.Bez || "";
                document.getElementById("text").value = data.Text || "";
                document.getElementById("bem").value = data.Bem || "";
                document.getElementById("ja").value = data.Ja || "";
                document.getElementById("nein").value = data.Nein || "";
                document.getElementById("unsicher").value = data.Unsicher || "";
                document.getElementById("initial").value = data.Initial ? "1" : "0";
                document.getElementById("frageForm").dataset.frageId = frageId;
            })
            .catch(error => alert("Fehler beim Laden der Frage."));
    }

    function updateFrage() {
        const frageId = document.getElementById("frageForm").dataset.frageId;
        if (!frageId) {
            alert("Bitte zuerst eine Frage auswählen.");
            return;
        }

        // Read select value (not .checked!)
        const initialValue = document.getElementById("initial").value;

        // If setting as Startfrage, confirm first
        if (initialValue === "1") {
            if (!confirm("Achtung: Es kann nur eine Startfrage geben. Wenn Sie fortfahren, wird diese Frage zur neuen Startfrage gesetzt und alle anderen werden zurückgesetzt. Fortfahren?")) {
                return; // Abort update
            }
        }

        const formData = {
            id: parseInt(frageId),
            bez: document.getElementById("bez").value,
            text: document.getElementById("text").value,
            bem: document.getElementById("bem").value,
            ja: document.getElementById("ja").value || null,
            nein: document.getElementById("nein").value || null,
            unsicher: document.getElementById("unsicher").value || null,
            initial: parseInt(initialValue) // 0 or 1
        };

        fetch('/update_frage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => alert(data.message))
        .catch(error => alert("Fehler beim Aktualisieren der Frage."));
    }
</script>
{% endblock %}
