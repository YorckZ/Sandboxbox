<div class="container mt-5 mb-5">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h2 class="mb-4 text-danger">
                <i class="bi bi-trash3 me-2"></i>Antwort löschen
            </h2>

            <div class="mb-4">
                <label for="antwortSelect" class="form-label">
                    Antwort auswählen
                    <i class="bi bi-info-circle-fill ms-2 text-info"
                       data-bs-toggle="tooltip"
                       title="Wählen Sie die Antwort aus, die Sie löschen möchten."></i>
                </label>
                <select id="antwortSelect" class="form-select rounded-3 w-auto d-inline-block mb-2">
                    <option value="">-- Bitte wählen --</option>
                    {% for antwort in antworten %}
                        <option value="{{ antwort.ID }}">{{ antwort.Bez }}</option>
                    {% endfor %}
                </select>
            </div>

            <button id="deleteBtn" class="btn btn-danger px-4 rounded-3 shadow-sm" disabled>
                <i class="bi bi-trash me-1"></i>Löschen
            </button>
        </div>
    </div>
</div>


<script>
    const antwortSelect = document.getElementById("antwortSelect");
    const deleteBtn = document.getElementById("deleteBtn");

    antwortSelect.addEventListener("change", () => {
        deleteBtn.disabled = !antwortSelect.value;
    });

    deleteBtn.addEventListener("click", () => {
        const antwortId = antwortSelect.value;
        const antwortText = antwortSelect.options[antwortSelect.selectedIndex].text;

        if (!antwortId) return;

        const confirmDelete = confirm(`Möchten Sie die Antwort "${antwortText}" wirklich löschen?`);
        if (!confirmDelete) return;

        fetch(`/delete_antwort/${antwortId}`, {
            method: "DELETE"
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);

            antwortSelect.remove(antwortSelect.selectedIndex);
            deleteBtn.disabled = true;
        })
        .catch(error => {
            console.error("Fehler beim Löschen:", error);
            alert("Ein Fehler ist aufgetreten.");
        });
    });
</script>
{% endblock %}
