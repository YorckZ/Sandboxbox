{% extends 'index.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Antwort löschen</h1>

    <label for="antwortSelect">Antwort auswählen:</label>
    <select id="antwortSelect" class="form-select mb-3">
        <option value="">-- Bitte wählen --</option>
        {% for antwort in antworten %}
        <option value="{{ antwort.ID }}">{{ antwort.Bez }}</option>
        {% endfor %}
    </select>

    <button id="deleteBtn" class="btn btn-primary" disabled>Löschen</button>
</div>

<script>
    const antwortSelect = document.getElementById("antwortSelect");
    const deleteBtn = document.getElementById("deleteBtn");

    antwortSelect.addEventListener("change", () => {
        deleteBtn.disabled = !antwortSelect.value;
    });

    deleteBtn.addEventListener("click", () => {
        const antwortId = antwortSelect.value;
        const antwortText = antwortSelect.options[antwortSelect.selectedIndex].text;

        if (!antwortId) return;

        const confirmDelete = confirm(`Möchten Sie die Antwort "${antwortText}" wirklich löschen?`);
        if (!confirmDelete) return;

        fetch(`/delete_antwort/${antwortId}`, {
            method: "DELETE"
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);

            antwortSelect.remove(antwortSelect.selectedIndex);
            deleteBtn.disabled = true;
        })
        .catch(error => {
            console.error("Fehler beim Löschen:", error);
            alert("Ein Fehler ist aufgetreten.");
        });
    });
</script>
{% endblock %}
