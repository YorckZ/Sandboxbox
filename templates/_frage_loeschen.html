<div class="container mt-5 mb-5">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h2 class="mb-4 text-danger">
                <i class="bi bi-trash3 me-2"></i>Frage löschen
            </h2>

            <div class="mb-4">
                <label for="frageSelect" class="form-label">
                    Frage auswählen
                    <i class="bi bi-info-circle-fill ms-2 text-info"
                       data-bs-toggle="tooltip"
                       title="Wählen Sie die Frage aus, die Sie löschen möchten."></i>
                </label>
                <select id="frageSelect" class="form-select rounded-3 w-auto d-inline-block mb-2">
                    <option value="">-- Bitte wählen --</option>
                    {% for frage in fragen %}
                        <option value="{{ frage.ID }}">{{ frage.Bez }}</option>
                    {% endfor %}
                </select>
            </div>

            <button id="deleteBtn" class="btn btn-danger px-4 rounded-3 shadow-sm" disabled>
                <i class="bi bi-trash me-1"></i>Löschen
            </button>
        </div>
    </div>
</div>

<script>
    const frageSelect = document.getElementById("frageSelect");
    const deleteBtn = document.getElementById("deleteBtn");

    frageSelect.addEventListener("change", () => {
        deleteBtn.disabled = !frageSelect.value;
    });

    deleteBtn.addEventListener("click", () => {
        const frageId = frageSelect.value;
        const frageText = frageSelect.options[frageSelect.selectedIndex].text;

        if (!frageId) return;

        const confirmDelete = confirm(`Möchten Sie die Frage "${frageText}" wirklich löschen?`);
        if (!confirmDelete) return;

        fetch(`/delete_frage/${frageId}`, {
            method: "DELETE"
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);

            frageSelect.remove(frageSelect.selectedIndex);
            deleteBtn.disabled = true;
        })
        .catch(error => {
            console.error("Fehler beim Löschen:", error);
            alert("Ein Fehler ist aufgetreten.");
        });
    });
</script>
{% endblock %}
