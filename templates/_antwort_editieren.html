{% extends 'index.html' %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h2 class="mb-4 text-primary">
                <i class="bi bi-pencil-square me-2"></i>Antwort bearbeiten
            </h2>

            <div class="mb-4">
                <label for="antwortSelect" class="form-label">
                    Antwort auswählen
                    <i class="bi bi-info-circle-fill ms-2 text-info"
                       data-bs-toggle="tooltip"
                       title="Wählen Sie eine bestehende Antwort aus, um sie zu bearbeiten."></i>
                </label>
                <select id="antwortSelect" class="form-select rounded-3 w-auto d-inline-block" onchange="loadAntwort()">
                    <option value="">-- Bitte wählen --</option>
                    {% for antwort in antworten %}
                        <option value="{{ antwort.ID }}">{{ antwort.Bez }}</option>
                    {% endfor %}
                </select>
            </div>

            <form id="antwortForm" autocomplete="off">
                <div class="mb-3">
                    <label for="bez" class="form-label">
                        Identifikator
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Ein kurzer, eindeutiger Name (z.B. AN01), der diese Antwort im System identifiziert."></i>
                    </label>
                    <input type="text" class="form-control rounded-3" id="bez" name="bez" required placeholder="z.B. AN01">
                </div>

                <div class="mb-4">
                    <label for="text" class="form-label">
                        Antworttext
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Formulieren Sie hier die Antwort, wie sie den Nutzern angezeigt werden soll."></i>
                    </label>
                    <textarea class="form-control rounded-3" id="text" name="text" rows="3" required placeholder="Geben Sie die vollständige Antwort ein..."></textarea>
                </div>

                <button type="button" class="btn btn-primary px-4 rounded-3 shadow-sm" onclick="updateAntwort()">
                    <i class="bi bi-arrow-repeat me-1"></i>Aktualisieren
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function loadAntwort() {
        const antwortId = document.getElementById("antwortSelect").value;
        if (!antwortId) return;

        fetch(`/get_antwort/${antwortId}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("bez").value = data.Bez || "";
                document.getElementById("text").value = data.Text || "";

                document.getElementById("antwortForm").dataset.antwortId = antwortId;
            })
            .catch(error => alert("Fehler beim Laden der Antwort."));
    }

    function updateAntwort() {
        const antwortId = document.getElementById("antwortForm").dataset.antwortId;
        if (!antwortId) {
            alert("Bitte zuerst eine Antwort auswählen.");
            return;
        }

        const formData = {
            id: parseInt(antwortId),
            bez: document.getElementById("bez").value,
            text: document.getElementById("text").value
        };

        fetch('/update_antwort', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => alert(data.message))
        .catch(error => alert("Fehler beim Aktualisieren der Antwort."));
    }
</script>

{% endblock %}
