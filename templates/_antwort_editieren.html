{% extends 'index.html' %}

{% block content %}

<h1>Edit Antwort</h1>

<label for="antwortSelect">Select Antwort:</label>
<select id="antwortSelect" onchange="loadAntwort()">
    <option value="">-- Select --</option>
    {% for antwort in antworten %}
        <option value="{{ antwort.ID }}">{{ antwort.Bez }}</option>
    {% endfor %}
</select>

<form id="antwortForm">
    <div class="mb-3">
        <label for="bez" class="form-label">
            Identifikator:
            <i class="bi bi-info-circle-fill ms-2 text-info" data-bs-toggle="tooltip" title="Eindeutiger Kurzname für die Antwort."></i>
        </label>
        <input type="text" class="form-control" id="bez" name="bez" required>
    </div>
    <div class="mb-3">
        <label for="text" class="form-label">
            Antworttext:
            <i class="bi bi-info-circle-fill ms-2 text-info" data-bs-toggle="tooltip" title="Der vollständige Text der Antwort, wie sie angezeigt wird."></i>
        </label>
        <textarea class="form-control" id="text" name="text" rows="4" required></textarea>
    </div>
    <button type="button" class="btn btn-primary" onclick="updateAntwort()">Update</button>
</form>

<script>
    function loadAntwort() {
        const antwortId = document.getElementById("antwortSelect").value;
        if (!antwortId) return;

        fetch(`/get_antwort/${antwortId}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("bez").value = data.Bez || "";
                document.getElementById("text").value = data.Text || "";

                document.getElementById("antwortForm").dataset.antwortId = antwortId;
            })
            .catch(error => alert("Fehler beim Laden der Antwort."));
    }

    function updateAntwort() {
        const antwortId = document.getElementById("antwortForm").dataset.antwortId;
        if (!antwortId) {
            alert("Bitte zuerst eine Antwort auswählen.");
            return;
        }

        const formData = {
            id: parseInt(antwortId),
            bez: document.getElementById("bez").value,
            text: document.getElementById("text").value
        };

        fetch('/update_antwort', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => alert(data.message))
        .catch(error => alert("Fehler beim Aktualisieren der Antwort."));
    }
</script>

{% endblock %}
