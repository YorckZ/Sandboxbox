{% extends "index.html" %}

{% block content %}

<div class="container mt-5 mb-5">
  <div class="card shadow rounded-4 border-0">
    <div class="card-body p-4">
      <h2 class="mb-4 text-primary">
        <i class="bi bi-pencil-square me-2"></i>Antwort bearbeiten
      </h2>

      <form id="antwortForm" autocomplete="off">
        <!-- Auswahl der Antwort -->
        <div class="mb-4">
          <label for="antwortSelect" class="form-label">
            Antwort auswählen
            <i class="bi bi-info-circle-fill ms-2 text-info"
               data-bs-toggle="tooltip"
               title="Wählen Sie eine bestehende Antwort aus, um sie zu bearbeiten."></i>
          </label>
          <select id="antwortSelect" class="form-select rounded-3 w-auto d-inline-block">
            <option value="">-- Bitte wählen --</option>
          </select>
        </div>

        <!-- Bez -->
        <div class="mb-3">
          <label for="bez" class="form-label">
            Kurzbezeichnung
            <i class="bi bi-info-circle-fill ms-2 text-info"
               data-bs-toggle="tooltip"
               title="Eindeutige Kurzbezeichnung der Antwort."></i>
          </label>
          <input type="text" class="form-control rounded-3" id="bez" name="bez" required>
        </div>

        <!-- Text -->
        <div class="mb-3">
          <label for="text" class="form-label">
            Antworttext
            <i class="bi bi-info-circle-fill ms-2 text-info"
               data-bs-toggle="tooltip"
               title="Vollständiger Text der Antwort."></i>
          </label>
          <textarea class="form-control rounded-3" id="text" name="text" rows="4" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary px-4 rounded-3 shadow-sm">
          <i class="bi bi-arrow-repeat me-1"></i>Aktualisieren
        </button>

        <a href="/graph" class="btn btn-primary px-4 rounded-3 shadow-sm ms-2">
          <i class="bi bi-diagram-3 me-1"></i>Graph
        </a>

      </form>

      <p id="statusMessage" class="mt-3"></p>
    </div>
  </div>
</div>

<script>
  // --- Helpers ---
  function fillAntwortDropdown() {
    const sel = document.getElementById("antwortSelect");
    return fetch("/get_antworten")
      .then(r => r.json())
      .then(list => {
        // expect list like [{ID, Bez}, ...]
        list.sort((a, b) => (a.Bez || "").toLowerCase().localeCompare((b.Bez || "").toLowerCase()));
        sel.innerHTML = '<option value="">-- Bitte wählen --</option>';
        list.forEach(item => {
          const opt = document.createElement("option");
          opt.value = item.ID;
          opt.textContent = item.Bez;
          sel.appendChild(opt);
        });
      });
  }

  function loadAntwort(id) {
    if (!id) return;
    fetch(`/get_antwort/${id}`)
      .then(r => r.json())
      .then(data => {
        // expect {Bez, Text}
        document.getElementById("bez").value = data.Bez || "";
        document.getElementById("text").value = data.Text || "";
        document.getElementById("antwortForm").dataset.antwortId = id;
      })
      .catch(() => {
        document.getElementById("statusMessage").textContent = "Fehler beim Laden der Antwort.";
      });
  }

  // --- Events ---
  document.addEventListener("DOMContentLoaded", function () {
    // tooltips
    const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    tooltipTriggerList.map(el => new bootstrap.Tooltip(el));

    // load dropdown
    fillAntwortDropdown().then(() => {
      // Preselect via ?id=...
      const params = new URLSearchParams(window.location.search);
      const preId = params.get("id");
      if (preId) {
        const sel = document.getElementById("antwortSelect");
        sel.value = preId;
        loadAntwort(preId);
      }
    });

    document.getElementById("antwortSelect").addEventListener("change", function () {
      const id = this.value;
      loadAntwort(id);
    });

    document.getElementById("antwortForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const id = this.dataset.antwortId || document.getElementById("antwortSelect").value;
      if (!id) {
        document.getElementById("statusMessage").textContent = "Bitte zuerst eine Antwort auswählen.";
        return;
      }

      const payload = {
        id: parseInt(id, 10),
        bez: document.getElementById("bez").value,
        text: document.getElementById("text").value
      };

      fetch("/update_antwort", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById("statusMessage").textContent = data.message || "Gespeichert.";
        // Refresh dropdown in case Bez changed
        return fillAntwortDropdown();
      })
      .catch(() => {
        document.getElementById("statusMessage").textContent = "Fehler beim Speichern.";
      });
    });
  });
</script>

{% endblock %}
