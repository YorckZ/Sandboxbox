{% extends "index.html" %}

{% block content %}

<div class="container mt-5 mb-5">
  <div class="card shadow rounded-4 border-0">
    <div class="card-body p-4">
      <h2 class="mb-4 text-primary">
        <i class="bi bi-cpu me-2"></i>LLM konfigurieren
      </h2>

      <form id="llmConfigForm" autocomplete="off">
        <div class="mb-4">
          <label for="provider" class="form-label">LLM-Anbieter</label>
          <select class="form-select rounded-3 w-auto" id="provider" name="provider">
            <option value="ollama">Lokal: Ollama</option>
            <option value="openai">Cloud: ChatGPT API</option>
          </select>
        </div>

        <div id="ollamaSection" class="border rounded-4 p-3 mb-4">
          <h5 class="text-primary mb-3">Ollama</h5>

          <div class="mb-3">
            <label for="ollama_base_url" class="form-label">Ollama Base URL</label>
            <input type="text" class="form-control rounded-3" id="ollama_base_url" name="ollama_base_url">
          </div>

          <div class="mb-3">
            <label for="ollama_model" class="form-label">Ollama Modell</label>
            <input type="text" class="form-control rounded-3" id="ollama_model" name="ollama_model">
          </div>
        </div>

        <div id="openaiSection" class="border rounded-4 p-3 mb-4">
          <h5 class="text-primary mb-3">ChatGPT API</h5>

          <div id="apiKeyInfo" class="alert alert-info d-none">
            Es ist bereits ein API-Key gespeichert. Feld leer lassen, um den bestehenden Key beizubehalten.
          </div>

          <div class="mb-3">
            <label for="openai_api_key" class="form-label">OpenAI API-Key</label>
            <input type="password" class="form-control rounded-3" id="openai_api_key" name="openai_api_key">
          </div>

          <div class="mb-3">
            <label for="openai_model" class="form-label">OpenAI Modell</label>
            <input type="text" class="form-control rounded-3" id="openai_model" name="openai_model">
          </div>

          <div class="mb-3">
            <label for="openai_base_url" class="form-label">OpenAI Base URL</label>
            <input type="text" class="form-control rounded-3" id="openai_base_url" name="openai_base_url">
          </div>
        </div>

        <div class="border rounded-4 p-3 mb-4">
          <h5 class="text-primary mb-3">Generelle Parameter</h5>

          <div class="mb-3">
            <label for="temperature" class="form-label">Temperature</label>
            <input type="number" step="0.1" min="0" max="2" class="form-control rounded-3 w-auto" id="temperature" name="temperature">
          </div>

          <div class="mb-3">
            <label for="max_output_tokens" class="form-label">Max Output Tokens</label>
            <input type="number" min="1" class="form-control rounded-3 w-auto" id="max_output_tokens" name="max_output_tokens">
          </div>
        </div>

        <button type="submit" class="btn btn-primary px-4 rounded-3 shadow-sm">
          <i class="bi bi-save me-1"></i>Speichern
        </button>
      </form>

      <p id="statusMessage" class="mt-3"></p>
    </div>
  </div>
</div>

<script>
  function toggleProviderSections() {
    const provider = document.getElementById("provider").value;
    document.getElementById("ollamaSection").style.display = provider === "ollama" ? "" : "none";
    document.getElementById("openaiSection").style.display = provider === "openai" ? "" : "none";
  }

  function loadLlmConfig() {
    fetch("/get_llm_config")
      .then(r => r.json())
      .then(data => {
        document.getElementById("provider").value = data.provider || "ollama";

        document.getElementById("ollama_base_url").value = data.ollama_base_url || "http://localhost:11434";
        document.getElementById("ollama_model").value = data.ollama_model || "llama3.1";

        document.getElementById("openai_api_key").value = "";
        document.getElementById("openai_model").value = data.openai_model || "gpt-4.1-mini";
        document.getElementById("openai_base_url").value = data.openai_base_url || "";

        document.getElementById("temperature").value = data.temperature ?? 0.2;
        document.getElementById("max_output_tokens").value = data.max_output_tokens ?? 1000;

        if (data.openai_api_key_set) {
          document.getElementById("apiKeyInfo").classList.remove("d-none");
        } else {
          document.getElementById("apiKeyInfo").classList.add("d-none");
        }

        toggleProviderSections();
      })
      .catch(err => {
        console.error(err);
        document.getElementById("statusMessage").textContent = "Fehler beim Laden der LLM-Konfiguration.";
      });
  }

  document.addEventListener("DOMContentLoaded", function () {
    loadLlmConfig();

    document.getElementById("provider").addEventListener("change", toggleProviderSections);

    document.getElementById("llmConfigForm").addEventListener("submit", function (event) {
      event.preventDefault();

      const payload = {
        provider: document.getElementById("provider").value,

        ollama_base_url: document.getElementById("ollama_base_url").value.trim(),
        ollama_model: document.getElementById("ollama_model").value.trim(),

        openai_api_key: document.getElementById("openai_api_key").value.trim(),
        openai_model: document.getElementById("openai_model").value.trim(),
        openai_base_url: document.getElementById("openai_base_url").value.trim(),

        temperature: parseFloat(document.getElementById("temperature").value || "0.2"),
        max_output_tokens: parseInt(document.getElementById("max_output_tokens").value || "1000", 10)
      };

      fetch("/save_llm_config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById("statusMessage").textContent = data.message || "Gespeichert.";
        document.getElementById("openai_api_key").value = "";
        loadLlmConfig();
      })
      .catch(err => {
        console.error(err);
        document.getElementById("statusMessage").textContent = "Fehler beim Speichern.";
      });
    });
  });
</script>

{% endblock %}
