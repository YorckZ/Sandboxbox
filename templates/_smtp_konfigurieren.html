{% extends 'index.html' %}

{% block content %}
<div class="container mt-5 mb-5">
  <div class="card shadow rounded-4 border-0">
    <div class="card-body p-4">
      <h2 class="mb-4 text-primary">
        <i class="bi bi-envelope-at me-2"></i>SMTP konfigurieren
      </h2>

      <form id="smtpConfigForm" autocomplete="off">
        <div class="mb-3">
          <label for="smtp_host" class="form-label">SMTP-Host</label>
          <input type="text" class="form-control rounded-3" id="smtp_host" required>
        </div>

        <div class="mb-3">
          <label for="smtp_port" class="form-label">SMTP-Port</label>
          <input type="number" class="form-control rounded-3" id="smtp_port" value="587" required>
        </div>

        <div class="mb-3">
          <label for="smtp_user" class="form-label">SMTP-Benutzername</label>
          <input type="text" class="form-control rounded-3" id="smtp_user" required>
        </div>

        <div class="mb-3">
          <label for="smtp_password" class="form-label">SMTP-Passwort</label>
          <input type="password" class="form-control rounded-3" id="smtp_password">
          <div id="passwordHint" class="form-text"></div>
        </div>

        <div class="mb-3">
          <label for="smtp_from" class="form-label">Absenderadresse</label>
          <input type="email" class="form-control rounded-3" id="smtp_from" required>
        </div>

        <div class="mb-4">
          <label for="use_tls" class="form-label">TLS verwenden?</label>
          <select class="form-select rounded-3 w-auto" id="use_tls">
            <option value="1">Ja</option>
            <option value="0">Nein</option>
          </select>
        </div>

        <button type="button" class="btn btn-primary px-4 rounded-3 shadow-sm" onclick="saveSmtpConfig()">
          <i class="bi bi-save me-1"></i>Speichern
        </button>
      </form>

      <p id="statusMessage" class="mt-3"></p>
    </div>
  </div>
</div>

<script>
function loadSmtpConfig() {
  fetch("/get_smtp_config", { cache: "no-store" })
    .then(r => r.json())
    .then(data => {
      document.getElementById("smtp_host").value = data.smtp_host || "";
      document.getElementById("smtp_port").value = data.smtp_port || 587;
      document.getElementById("smtp_user").value = data.smtp_user || "";
      document.getElementById("smtp_from").value = data.smtp_from || "";
      document.getElementById("use_tls").value = data.use_tls ? "1" : "0";

      if (data.smtp_password_set) {
        document.getElementById("passwordHint").textContent =
          "Ein Passwort ist gespeichert. Leer lassen, um es nicht zu ändern.";
      }
    })
    .catch(() => {
      document.getElementById("statusMessage").textContent = "Fehler beim Laden der SMTP-Konfiguration.";
    });
}

function saveSmtpConfig() {
  const payload = {
    smtp_host: document.getElementById("smtp_host").value,
    smtp_port: document.getElementById("smtp_port").value,
    smtp_user: document.getElementById("smtp_user").value,
    smtp_password: document.getElementById("smtp_password").value,
    smtp_from: document.getElementById("smtp_from").value,
    use_tls: document.getElementById("use_tls").value === "1"
  };

  fetch("/save_smtp_config", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById("statusMessage").textContent = data.message || "Gespeichert.";
    document.getElementById("smtp_password").value = "";
    loadSmtpConfig();
  })
  .catch(() => {
    document.getElementById("statusMessage").textContent = "Fehler beim Speichern.";
  });
}

document.addEventListener("DOMContentLoaded", loadSmtpConfig);
</script>
{% endblock %}
