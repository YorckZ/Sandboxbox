{% extends 'index.html' %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h2 class="mb-4 text-danger">
                <i class="bi bi-trash3 me-2"></i>Prompt löschen
            </h2>

            <div class="mb-4">
                <label for="promptSelect" class="form-label">
                    Prompt auswählen
                    <i class="bi bi-info-circle-fill ms-2 text-info"
                       data-bs-toggle="tooltip"
                       title="Wählen Sie einen bestehenden Prompt aus, den Sie löschen möchten."></i>
                </label>
                <select id="promptSelect" class="form-select rounded-3 w-auto d-inline-block mb-2">
                    <option value="">-- Bitte wählen --</option>
                    {% for prompt in prompts %}
                        <option value="{{ prompt.ID }}">{{ prompt.Bez }}</option>
                    {% endfor %}
                </select>
            </div>

            <button id="deleteBtn" class="btn btn-danger px-4 rounded-3 shadow-sm" disabled>
                <i class="bi bi-trash me-1"></i>Löschen
            </button>
        </div>
    </div>
</div>

<script>
    const promptSelect = document.getElementById("promptSelect");
    const deleteBtn = document.getElementById("deleteBtn");

    promptSelect.addEventListener("change", () => {
        deleteBtn.disabled = !promptSelect.value;
    });

    deleteBtn.addEventListener("click", () => {
        const promptId = promptSelect.value;
        const promptText = promptSelect.options[promptSelect.selectedIndex].text;

        if (!promptId) return;

        const confirmDelete = confirm(`Möchten Sie das Prompt "${promptText}" wirklich löschen?`);
        if (!confirmDelete) return;

        fetch(`/delete_prompt/${promptId}`, {
            method: "DELETE"
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);

            promptSelect.remove(promptSelect.selectedIndex);
            deleteBtn.disabled = true;
        })
        .catch(error => {
            console.error("Fehler beim Löschen:", error);
            alert("Ein Fehler ist aufgetreten.");
        });
    });
</script>
{% endblock %}
