{% extends 'index.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Prompt löschen</h1>

    <label for="promptSelect">Prompt auswählen:</label>
    <select id="promptSelect" class="form-select mb-3">
        <option value="">-- Bitte wählen --</option>
        {% for prompt in prompts %}
        <option value="{{ prompt.ID }}">{{ prompt.Bez }}</option>
        {% endfor %}
    </select>

    <button id="deleteBtn" class="btn btn-primary" disabled>Löschen</button>
</div>

<script>
    const promptSelect = document.getElementById("promptSelect");
    const deleteBtn = document.getElementById("deleteBtn");

    promptSelect.addEventListener("change", () => {
        deleteBtn.disabled = !promptSelect.value;
    });

    deleteBtn.addEventListener("click", () => {
        const promptId = promptSelect.value;
        const promptText = promptSelect.options[promptSelect.selectedIndex].text;

        if (!promptId) return;

        const confirmDelete = confirm(`Möchten Sie das Prompt "${promptText}" wirklich löschen?`);
        if (!confirmDelete) return;

        fetch(`/delete_prompt/${promptId}`, {
            method: "DELETE"
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);

            promptSelect.remove(promptSelect.selectedIndex);
            deleteBtn.disabled = true;
        })
        .catch(error => {
            console.error("Fehler beim Löschen:", error);
            alert("Ein Fehler ist aufgetreten.");
        });
    });
</script>
{% endblock %}
