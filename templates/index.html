<!DOCTYPE html>
<html lang="de" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox-Box</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>


<!--    Title Bar-->
    <header>
        <style>
            /* General styling for the header */
            header {
                padding: 10px;
            }

            /* Styling for the header title */
            .header-title h1 {
                margin: 0;
            }

            /* Styling for the header images container */
            .header-images {
                display: flex;
                justify-content: flex-end; /* Align images to the right */
                gap: 10px; /* Add space between images */
                padding: 10px; /* Add padding around images for better spacing */
                border-radius: 5px; /* Optional: rounded corners */
            }

            /* Styling for individual images */
            .header-images img {
                max-height: 50px; /* Adjust image size if needed */
                background-color: white; /* White background for each image */
                padding: 5px; /* Padding inside image background */
                border: 1px solid #ccc; /* Optional: subtle border */
                border-radius: 5px; /* Optional: rounded corners for images */
            }
        </style>
        <div class="row" >
            <div class="col-2"></div>
            <div class="col-8 d-flex align-items-center">
                <div class="header-title">
                    <h1>Sandbox-Box</h1>
                </div>
            </div>
            <div class="col-2"></div>
        </div>
    </header>

<!--    Dynamic Nav Bar-->
    <div class="row">
        <div class="col-3 navbar-y"></div>
        <div class="navbar-y col-6 d-flex justify-content-around">
            <a href="/">Start</a>
            <a href="/sat">Self-Assessment</a>
            <div class="dropdown-y">
                <button class="dropbtn">Admin
                    <i class="fa fa-caret-down"></i>
                </button>
                <div class="dropdown-content">
                    <a href="/insert_frage">Insert Frage</a>
                    <a href="/insert_prompt">Insert Prompt</a>
                </div>
            </div>
        </div>
        <div class="col-3 navbar-y"></div>
    </div>


<!--    Main Content Frame-->
    <div class="row">
        <div class="col-3"></div>
        <div class="col-6">
            <div id="main-content">
                {% block content %}
                <!-- Dynamic Content Goes Here -->
                {% endblock %}
            </div>
        </div>
        <div class="col-3"></div>
    </div>

</body>
</html>
