{% extends "index.html" %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4">
            <h2 class="mb-4 text-primary">
                <i class="bi bi-plus-circle me-2"></i>Neuen Prompt hinzufügen
            </h2>

            <form id="promptForm" autocomplete="off">
                <div class="mb-3">
                    <label for="bez" class="form-label">
                        Kurzbezeichnung
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Ein kurzer, eindeutiger Name (z.B. PR01), der diesen Prompt identifiziert."></i>
                    </label>
                    <input type="text" class="form-control rounded-3" id="bez" name="bez" required placeholder="z.B. PR01">
                </div>

                <div class="mb-3">
                    <label for="system" class="form-label">
                        System
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="System-Prompt: Steuert das Verhalten des LLMs (z. B. Rollenbeschreibung oder Formatvorgaben)."></i>
                    </label>
                    <textarea class="form-control rounded-3" id="system" name="system" rows="3" required placeholder="z.B. Du bist ein hilfsbereiter Assistent..."></textarea>
                </div>

                <div class="mb-3">
                    <label for="dsgvo" class="form-label">
                        DSGVO
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Geben Sie hier ggf. DSGVO-relevante Hinweise oder Einschränkungen für den Prompt ein. (optional)"></i>
                    </label>
                    <textarea class="form-control rounded-3" id="dsgvo" name="dsgvo" rows="2" placeholder="z.B. Keine personenbezogenen Daten verwenden..."></textarea>
                </div>

                <div class="mb-4">
                    <label for="task" class="form-label">
                        Aufgabe des LLMs
                        <i class="bi bi-info-circle-fill ms-2 text-info"
                           data-bs-toggle="tooltip"
                           title="Beschreiben Sie die konkrete Aufgabe oder den Anwendungszweck für das LLM. (optional)"></i>
                    </label>
                    <textarea class="form-control rounded-3" id="task" name="task" rows="2" placeholder="z.B. Antworten auf juristische Fragen formulieren..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary px-4 rounded-3 shadow-sm">
                    <i class="bi bi-save me-1"></i>Speichern
                </button>
            </form>

            <p id="statusMessage" class="mt-3"></p>
        </div>
    </div>
</div>

<!-- Bootstrap Tooltips Activation Script -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });

        document.getElementById("promptForm").addEventListener("submit", function (event) {
            event.preventDefault();
            let formData = {
                bez: document.getElementById("bez").value,
                system: document.getElementById("system").value,
                dsgvo: document.getElementById("dsgvo").value,
                task: document.getElementById("task").value
            };

            fetch("/save_prompt", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("statusMessage").textContent = data.message;
                document.getElementById("promptForm").reset();
            })
            .catch(error => console.error("Fehler:", error));
        });
    });
</script>
{% endblock %}
